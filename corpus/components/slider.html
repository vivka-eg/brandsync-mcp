<!--

-->
<!-- brandsync: Slider / Variants / Default | requires: brandsync-tokens -->
<style>
.bs-slider-wrapper { display: flex; flex-direction: column; gap: var(--bs-spacing-100); width: 100%; }
.bs-slider-label { display: flex; justify-content: space-between; font-size: var(--bs-font-size-sm); color: var(--bs-text-default); font-weight: 500; }
.bs-slider-value { color: var(--bs-color-primary-default); font-weight: 700; }
input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; height: var(--bs-spacing-50); background: var(--bs-surface-hover); border-radius: var(--bs-border-radius-full); outline: none; cursor: pointer; }
input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: var(--bs-spacing-250); height: var(--bs-spacing-250); border-radius: var(--bs-border-radius-full); background: var(--bs-color-primary-default); cursor: pointer; border: 2px solid var(--bs-surface-base); box-shadow: var(--bs-shadow-elevation-xs); transition: background 0.bs-15s; }
input[type="range"]::-webkit-slider-thumb:hover { background: var(--bs-color-primary-hover); }
input[type="range"]:focus-visible { outline: 2px solid var(--bs-border-neutral-focus); outline-offset: 4px; border-radius: var(--bs-border-radius-full); }
.bs-slider-track { display: flex; justify-content: space-between; font-size: var(--bs-font-size-xs); color: var(--bs-text-muted); }
</style>
<div class="bs-slider-wrapper">
  <div class="bs-slider-label">
    <span>Volume</span>
    <span class="bs-slider-value">60</span>
  </div>
  <input type="range" min="0" max="100" value="60" aria-label="Volume" aria-valuenow="60" aria-valuemin="0" aria-valuemax="100"
    oninput="this.previousElementSibling.querySelector('.slider-value').textContent = this.value" />
  <div class="bs-slider-track"><span>0</span><span>100</span></div>
</div>
