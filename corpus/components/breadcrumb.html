<!-- brandsync: Breadcrumb / Default | requires: brandsync-tokens -->
<style>
.bs-breadcrumb {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: var(--bs-spacing-50);
  font-family: inherit;
  font-size: var(--bs-font-size-md);
  line-height: var(--bs-font-size-2xl);
  list-style: none;
  margin: 0;
  padding: 0;
}
.bs-breadcrumb__item {
  display: flex;
  align-items: center;
  gap: var(--bs-spacing-50);
}
.bs-breadcrumb__link {
  color: var(--bs-text-action);
  text-decoration: none;
  font-weight: 400;
  cursor: pointer;
  transition: all 0.bs-15s ease;
  border-radius: var(--bs-border-radius-50);
  padding: 0 2px;
  outline: none;
}
.bs-breadcrumb__link:hover { text-decoration: underline; color: var(--bs-color-primary-hover); }
.bs-breadcrumb__link:focus-visible { outline: 2px solid var(--bs-border-neutral-focus); outline-offset: 2px; }
.bs-breadcrumb__current {
  color: var(--bs-text-default);
  font-weight: 600;
}
.bs-breadcrumb__separator {
  width: var(--bs-font-size-md);
  height: var(--bs-font-size-md);
  color: var(--bs-text-secondary);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.bs-breadcrumb__separator svg { width: var(--bs-font-size-md); height: var(--bs-font-size-md); display: block; }
.bs-breadcrumb__overflow {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: var(--bs-font-size-2xl);
  height: var(--bs-font-size-2xl);
  border-radius: var(--bs-border-radius-50);
  border: 1px solid var(--bs-border-default);
  color: var(--bs-text-secondary);
  cursor: pointer;
  font-size: var(--bs-font-size-sm);
  font-weight: 600;
  background: transparent;
  transition: all 0.bs-15s ease;
  letter-spacing: 1px;
}
.bs-breadcrumb__overflow:hover { background: var(--bs-surface-hover); color: var(--bs-text-default); }
</style>
