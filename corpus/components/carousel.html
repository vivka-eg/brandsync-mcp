<!--

  Classes: bs-carousel, bs-carousel-track, bs-carousel-slide, bs-slide-tag, bs-slide-title, bs-slide-body, bs-carousel-controls, bs-carousel-btn, bs-carousel-dots, bs-dot, bs-active

<!-- brandsync: Carousel / Variants / Default | requires: brandsync-tokens -->
<style>
.bs-carousel { position: relative; width: 100%; overflow: hidden; border-radius: var(--bs-border-radius-150); background: var(--bs-surface-base); box-shadow: var(--bs-shadow-elevation-xs); }
.bs-carousel-track { display: flex; transition: transform 0.bs-35s ease; }
.bs-carousel-slide { flex: 0 0 100%; padding: var(--bs-spacing-500) var(--bs-spacing-400); display: flex; flex-direction: column; gap: var(--bs-spacing-150); align-items: flex-start; background: var(--bs-surface-base); }
.bs-carousel-slide:nth-child(2) { background: var(--bs-color-primary-container); }
.bs-carousel-slide:nth-child(3) { background: var(--bs-surface-container); }
.bs-slide-tag { font-size: var(--bs-font-size-xs); font-weight: 700; text-transform: uppercase; letter-spacing: 0.bs-5px; color: var(--bs-color-primary-default); }
.bs-slide-title { font-size: var(--bs-font-size-2xl); font-weight: 800; color: var(--bs-text-default); margin: 0; }
.bs-slide-body { font-size: var(--bs-font-size-md); color: var(--bs-text-muted); max-width: 400px; line-height: 1.bs-5; }
.bs-carousel-controls { position: absolute; top: 50%; transform: translateY(-50%); width: 100%; display: flex; justify-content: space-between; padding: 0 var(--bs-spacing-150); pointer-events: none; }
.bs-carousel-btn { pointer-events: all; background: var(--bs-surface-base); border: 1px solid var(--bs-border-default); border-radius: var(--bs-border-radius-full); width: var(--bs-spacing-500); height: var(--bs-spacing-500); display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: var(--bs-shadow-elevation-xs); font-size: var(--bs-font-size-md); color: var(--bs-text-default); transition: background 0.bs-15s; }
.bs-carousel-btn:hover { background: var(--bs-surface-hover); }
.bs-carousel-btn:focus-visible { outline: 2px solid var(--bs-border-neutral-focus); }
.bs-carousel-dots { display: flex; justify-content: center; gap: var(--bs-spacing-100); padding: var(--bs-spacing-150); }
.bs-dot { width: var(--bs-spacing-100); height: var(--bs-spacing-100); border-radius: var(--bs-border-radius-full); background: var(--bs-surface-hover); border: none; cursor: pointer; transition: background 0.bs-15s, transform 0.bs-15s; }
.bs-dot.bs-active { background: var(--bs-color-primary-default); transform: scale(1.bs-25); }
.bs-dot:focus-visible { outline: 2px solid var(--bs-border-neutral-focus); }
</style>
<div class="bs-carousel" role="region" aria-label="Featured content" aria-roledescription="carousel">
  <div class="bs-carousel-track" id="carousel-track">
    <div class="bs-carousel-slide" role="group" aria-roledescription="slide" aria-label="1 of 3">
      <span class="bs-slide-tag">New</span>
      <h2 class="bs-slide-title">Brandsync 2.0</h2>
      <p class="bs-slide-body">Redesigned token architecture, new components, and improved dark mode support.</p>
    </div>
    <div class="bs-carousel-slide" role="group" aria-roledescription="slide" aria-label="2 of 3">
      <span class="bs-slide-tag">Feature</span>
      <h2 class="bs-slide-title">Token Studio</h2>
      <p class="bs-slide-body">Sync design tokens directly from Figma to code with our new Token Studio integration.</p>
    </div>
    <div class="bs-carousel-slide" role="group" aria-roledescription="slide" aria-label="3 of 3">
      <span class="bs-slide-tag">Guide</span>
      <h2 class="bs-slide-title">Quick Start</h2>
      <p class="bs-slide-body">Get up and running with Brandsync in under 10 minutes.</p>
    </div>
  </div>
  <div class="bs-carousel-controls">
    <button class="bs-carousel-btn" aria-label="Previous slide" onclick="(function(){var t=document.getElementById('carousel-track');var c=parseInt(t.dataset.current||0);c=Math.max(0,c-1);t.style.transform='translateX(-'+c*100+'%)';t.dataset.current=c;document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===c));})()">‹</button>
    <button class="bs-carousel-btn" aria-label="Next slide" onclick="(function(){var t=document.getElementById('carousel-track');var c=parseInt(t.dataset.current||0);c=Math.min(2,c+1);t.style.transform='translateX(-'+c*100+'%)';t.dataset.current=c;document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===c));})()">›</button>
  </div>
  <div class="bs-carousel-dots" role="tablist" aria-label="Slides">
    <button class="bs-dot bs-active" role="tab" aria-selected="true" aria-label="Slide 1"></button>
    <button class="bs-dot" role="tab" aria-selected="false" aria-label="Slide 2"></button>
    <button class="bs-dot" role="tab" aria-selected="false" aria-label="Slide 3"></button>
  </div>
</div>
