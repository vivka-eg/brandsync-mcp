<!-- brandsync: File Upload / Variants / Dropzone | requires: brandsync-tokens -->
<style>
.bs-dropzone { border: 2px dashed var(--bs-border-default); border-radius: var(--bs-border-radius-150); padding: var(--bs-spacing-500) var(--bs-spacing-300); display: flex; flex-direction: column; align-items: center; gap: var(--bs-spacing-150); text-align: center; cursor: pointer; transition: border-color 0.bs-15s, background 0.bs-15s; background: var(--bs-surface-base); }
.bs-dropzone:hover, .bs-dropzone.bs-dragging { border-color: var(--bs-color-primary-default); background: var(--bs-color-primary-container); }
.bs-dropzone:focus-visible { outline: 2px solid var(--bs-border-neutral-focus); outline-offset: 2px; }
.bs-dropzone input[type="file"] { display: none; }
.bs-upload-icon { font-size: var(--bs-font-size-2xl); color: var(--bs-icon-muted); }
.bs-upload-title { font-size: var(--bs-font-size-md); font-weight: 600; color: var(--bs-text-default); }
.bs-upload-hint { font-size: var(--bs-font-size-sm); color: var(--bs-text-muted); }
.bs-upload-link { color: var(--bs-text-action); text-decoration: underline; cursor: pointer; font-weight: 600; }
.bs-upload-link:hover { color: var(--bs-text-action-hover); }
.bs-file-types { font-size: var(--bs-font-size-xs); color: var(--bs-text-muted); }
</style>
<label class="bs-dropzone" tabindex="0" role="button" aria-label="Upload files — drag and drop or click to browse"
  ondragover="event.preventDefault();this.classList.add('dragging')"
  ondragleave="this.classList.remove('dragging')"
  ondrop="event.preventDefault();this.classList.remove('dragging')">
  <input type="file" multiple accept=".jpg,.png,.pdf,.doc" />
  <span class="bs-upload-icon" aria-hidden="true">☁</span>
  <div class="bs-upload-title">Drag &amp; drop files here</div>
  <div class="bs-upload-hint">or <span class="bs-upload-link">browse to upload</span></div>
  <div class="bs-file-types">Supported: JPG, PNG, PDF, DOC · Max 10 MB</div>
</label>
